<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Minh Bảo Mật</title>
    <!-- Font Awesome để hiển thị các logo mạng xã hội -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Canvas cho hiệu ứng hạt bụi tuyết rơi nền */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Khu vực hiển thị Avatar xoay tròn viền RGB (Đã đẩy cao lên bằng cách chỉnh margin-bottom) */
        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin-bottom: 25px; /* Đổi từ -20px thành 25px để đẩy avatar lên cao hơn hẳn */
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-rgb-border {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            z-index: 1;
            animation: rgb-glow 8s linear infinite;
        }

        .avatar-img {
            position: relative;
            width: calc(100% - 8px);
            height: calc(100% - 8px);
            border-radius: 50%;
            object-fit: cover;
            background-color: #161b26;
            z-index: 2;
            /* Hiệu ứng xoay tròn tại chỗ 20 giây/vòng */
            animation: spin-avatar 20s linear infinite;
        }

        @keyframes rgb-glow {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        @keyframes spin-avatar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Khung chứa giao diện chính */
        .container {
            background-color: #161b26;
            border: 1px solid #232d3f;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .subtitle {
            color: #8a99ad;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* Thanh tiến trình Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background-color: #1f2635;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ffd5, #10b981);
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .task-btn {
            background-color: #1f2635;
            color: #e2e8f0;
            border: 1px solid #2d3748;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .task-btn:hover {
            background-color: #2d3748;
        }

        .task-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-info i {
            font-size: 18px;
            width: 20px;
            text-align: center;
        }

        /* Màu riêng cho từng logo */
        .fa-telegram { color: #0088cc; }
        .fa-tiktok { color: #ffffff; }
        .fa-youtube { color: #ff0000; }

        /* Trạng thái nhiệm vụ hoàn thành */
        .task-btn.completed {
            border-color: #10b981;
            background-color: rgba(16, 185, 129, 0.1);
        }

        .status-icon::after {
            content: "○";
            color: #4a5568;
            font-weight: bold;
        }

        .task-btn.completed .status-icon::after {
            content: "✓";
            color: #10b981;
        }

        /* Nút xác nhận nhiệm vụ */
        .submit-btn {
            width: 100%;
            background-color: #2d3748;
            color: #718096;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: not-allowed;
            transition: all 0.3s ease;
        }

        .submit-btn.active {
            background-color: #10b981;
            color: #ffffff;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        
        .credit {
            margin-top: 15px;
            font-size: 13px;
            color: #4a5568;
        }
    </style>
</head>
<body>

    <!-- Canvas hạt bụi rơi -->
    <canvas id="snow-canvas"></canvas>

    <!-- Khối Avatar phía trên vòng tròn đỏ -->
    <div class="avatar-container">
        <div class="avatar-rgb-border"></div>
        <img src="avatar.jpg" alt="Avatar" class="avatar-img" onerror="this.src='https://i.imgur.com/8Km9tLL.png'">
    </div>

    <!-- Khung chức năng chính -->
    <div class="container">
        <h2>Xác minh bảo mật</h2>
        <div class="subtitle" id="progress-text">Hoàn thành nhiệm vụ (0/3) để tiếp tục</div>
        
        <!-- Thanh tiến trình trực quan -->
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="task-list">
            <!-- Nhiệm vụ 1: Telegram -->
            <a href="https://t.me/sharemenuhackffk12" target="_blank" class="task-btn" id="task1" onclick="completeTask('task1')">
                <div class="task-info">
                    <i class="fa-brands fa-telegram"></i>
                    <span>1. Vào Nhóm Chat Telegram</span>
                </div>
                <span class="status-icon"></span>
            </a>

            <!-- Nhiệm vụ 2: TikTok -->
            <a href="https://www.tiktok.com/@kieet.tuaan" target="_blank" class="task-btn" id="task2" onclick="completeTask('task2')">
                <div class="task-info">
                    <i class="fa-brands fa-tiktok"></i>
                    <span>2. Follow Kênh TikTok</span>
                </div>
                <span class="status-icon"></span>
            </a>

            <!-- Nhiệm vụ 3: YouTube -->
            <a href="https://www.youtube.com/@maituankiet2k12" target="_blank" class="task-btn" id="task3" onclick="completeTask('task3')">
                <div class="task-info">
                    <i class="fa-brands fa-youtube"></i>
                    <span>3. Đăng ký Kênh YouTube</span>
                </div>
                <span class="status-icon"></span>
            </a>
        </div>

        <button class="submit-btn" id="submit-btn" onclick="startCelebration()" disabled>Xác Nhận Nhiệm Vụ</button>
        <div class="credit">Tuaan Kieet K12 No.1</div>
    </div>

    <!-- Thư viện tạo hiệu ứng pháo hoa nhẹ và mượt -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        // 1. Hệ thống xử lý nhiệm vụ & Tiến trình
        let completedTasks = { task1: false, task2: false, task3: false };
        const totalTasks = 3;
        const destinationUrl = "https://sites.google.com/view/hackcheataim/home";

        function completeTask(taskId) {
            if (!completedTasks[taskId]) {
                completedTasks[taskId] = true;
                document.getElementById(taskId).classList.add('completed');
                updateProgress();
            }
        }

        function updateProgress() {
            let count = Object.values(completedTasks).filter(status => status === true).length;
            
            // Cập nhật số liệu chữ
            document.getElementById('progress-text').innerText = `Hoàn thành nhiệm vụ (${count}/${totalTasks}) để tiếp tục`;
            
            // Cập nhật chiều dài thanh tiến trình (%)
            let percentage = (count / totalTasks) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
            
            if (count === totalTasks) {
                let submitBtn = document.getElementById('submit-btn');
                submitBtn.removeAttribute('disabled');
                submitBtn.classList.add('active');
            }
        }

        // 2. Xử lý hiệu ứng bắn pháo hoa khi ấn nút Xác Nhận
        function startCelebration() {
            let count = Object.values(completedTasks).filter(status => status === true).length;
            if (count !== totalTasks) return;

            // Thiết lập cấu hình bắn pháo từ 2 bên góc dưới màn hình lên
            let duration = 3000; // Bắn liên tục trong vòng 3 giây
            let end = Date.now() + duration;

            (function frame() {
                // Bắn từ góc trái dưới
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 1 }
                });
                // Bắn từ góc phải dưới
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 1 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                } else {
                    // Sau đúng 3 giây chuyển hướng đến trang tải game Google Sites
                    window.location.href = destinationUrl;
                }
            }());
        }

        // 3. Hệ thống hạt bụi trắng rơi ngẫu nhiên như tuyết rơi mờ ảo
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height;
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedY = Math.random() * 1 + 0.4;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height) {
                    this.reset();
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    </script>
</body>
    </html>
